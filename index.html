<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千川全域投流 · 知识看板</title>
<style>
  :root{
    --bg:#0a0d13; --ink:#e9edf5; --sub:#8b96ab; --faint:#5c6678;
    --line:#222b3d; --cmt:#828ea6;
    --c-big:#e7ebf3; --c-small:#828ea6;
    --blue:#5b9bff; --green:#3ed28a; --orange:#f5a04a; --red:#f0616d;
    --purple:#b48bf2; --cyan:#3fd0de; --gold:#ecc26a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:
      radial-gradient(1100px 560px at 82% -12%, #16223e 0%, transparent 58%),
      radial-gradient(820px 480px at -8% 8%, #1a1530 0%, transparent 52%),
      var(--bg);
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;font-size:14px}
  .wrap{width:100%;max-width:none;margin:0;padding:0 24px 90px}

  .bar{position:sticky;top:0;z-index:60;background:rgba(10,13,19,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 24px;margin:0 -24px 6px}
  .bar .logo{font-weight:800;font-size:14.5px;flex:1;background:linear-gradient(90deg,#7db0ff,#b48bf2);-webkit-background-clip:text;background-clip:text;color:transparent}
  .btn{border:1px solid #2c3850;background:#151b28;color:var(--ink);padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--blue);color:#cfe0ff}
  .btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
  .cardbtn{display:none}.editing .cardbtn{display:inline-block}
  .status{font-size:12px;color:var(--sub);min-width:78px}
  .hint{font-size:11.5px;color:var(--faint);width:100%;margin-top:-1px}.hint b{color:var(--blue)}

  .hero{padding:20px 2px 4px}
  .hero h1{font-size:26px;margin:0;font-weight:800}
  .hero h1 b{background:linear-gradient(90deg,#5b9bff,#b48bf2,#3fd0de);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:var(--sub);font-size:12.5px;margin:7px 0 0;max-width:760px}
  .summary{margin:12px 0 6px;background:linear-gradient(120deg,#141b2b,#16142a);border:1px solid #2c3850;border-radius:12px;padding:11px 14px;font-size:12.5px;color:#c7d0e0}
  .summary b{color:#9fc0ff}
  h3.sec{font-size:21px;color:#eef2fa;margin:24px 2px 10px;font-weight:800;letter-spacing:.5px;border-left:4px solid var(--blue);padding-left:11px}
  /* 分类（大标题）增删控件 */
  .sectools{display:none;margin-left:12px;vertical-align:middle}
  .editing .sectools{display:inline-block}
  .delsec{border:1px solid #3b2530;background:#261720;color:#ff8a93;border-radius:7px;
    padding:2px 9px;font-size:11px;line-height:1.3;cursor:pointer;font-weight:600}
  .delsec:hover{border-color:#f0616d;background:#341923}
  .clr{font-size:11px;color:var(--sub);display:inline-flex;align-items:center;gap:3px;cursor:pointer}
  /* 隐藏云端历史里那颗多余的「+卡片」（顶栏已有，去重更清爽） */
  #content .contenttools{display:none!important}
  /* 占位提示：只在编辑时显示、一打字就消失（普通浏览看不到，干净） */
  .editing .ph:empty::before{content:attr(data-ph);color:var(--faint);font-weight:400;font-style:normal;opacity:.9;pointer-events:none}
  .editing .q b.ph,.editing .why .ph{display:inline-block;min-width:90px}
  /* 新增行：大字一整行、小字一整行。大点只属于大字，小点只属于小字 */
  ul.bul li:has(> .bigtext){padding-left:0}
  ul.bul li:has(> .bigtext)::before{content:none}
  ul.bul li .bigtext{display:block;position:relative;color:var(--c-big);font-size:13.5px;line-height:1.5;min-height:1.25em;padding-left:16px}
  ul.bul li .bigtext:not(:empty)::before{content:"•";position:absolute;left:2px;top:0;color:var(--ac,#7db0ff);font-size:13px;font-weight:800;line-height:1.5}
  ul.bul li .bigtext:empty{display:none}
  .editing ul.bul li .bigtext:empty{display:block}
  ul.bul li .subnote{display:block;color:var(--c-small);font-size:12px;line-height:1.45;position:relative;margin-left:18px;padding-left:16px}
  /* 小字行：只有自己的小灰点，不继承主列表的大点 */
  ul.bul li .subnote:not(:empty)::before{content:"•";position:absolute;left:4px;top:4px;color:var(--c-small);font-size:7px;font-weight:800;line-height:1}
  .editing ul.bul li .subnote.ph:empty::before{content:attr(data-ph);position:static;font-size:12px;font-weight:400;color:var(--faint)}
  ul.bul li .subnote:empty{display:none}
  .editing ul.bul li .subnote:empty{display:block}
  ul.bul li:has(.bigtext){position:relative;padding-right:26px}
  .editing ul.bul li:has(.bigtext)>.del{position:absolute;top:4px;right:2px;margin:0}
  .clr input[type=color]{width:22px;height:20px;border:1px solid #2c3850;border-radius:5px;background:none;padding:0;cursor:pointer}

  /* ===== 卡片瀑布流 ===== */
  .cards{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;justify-content:flex-start}
  .card{width:320px;flex:0 0 auto;border-radius:14px;overflow:hidden;
    background:linear-gradient(180deg,#161c2a,#11151f);border:1px solid var(--line);box-shadow:0 6px 22px rgba(0,0,0,.28)}
  /* 普通浏览时：过高的卡片限高、卡内出滚动条，看板更整齐（编辑时自动展开、不限高） */
  .card:not(.mcard){max-height:520px;overflow-y:auto;overflow-x:hidden}
  .editing .card,.layout .card{max-height:none}
  /* 自由画布：卡片绝对定位、可重叠、想放哪放哪（位置随云保存） */
  .cards.freecanvas{display:block;position:relative}
  .cards.freecanvas>.card{position:absolute;margin:0}
  .cards.freecanvas>.card:not(.mcard){max-height:none}
  .layout .cards.freecanvas{outline:1px dashed #243150;outline-offset:6px;border-radius:14px}
  @media(max-width:700px){.wrap{padding:0 16px 90px}.bar{padding:10px 16px;margin:0 -16px 6px}.card{width:100%}}
  /* 排版模式：顶部色条=拖动手柄、右下角缩放、卡内可滚动 */
  .layout .card{resize:both;overflow:auto;min-width:240px;min-height:96px}
  .layout .card.dragging{opacity:.5;outline:2px dashed var(--blue);outline-offset:2px}
  .layout .card>.top{height:22px;cursor:grab;position:sticky;top:0;z-index:4;
    display:flex;align-items:center;justify-content:center}
  .layout .card>.top::after{content:"⠿ 按住拖动排序";font-size:10px;font-weight:700;letter-spacing:1px;
    color:rgba(255,255,255,.92);text-shadow:0 1px 2px rgba(0,0,0,.4)}
  .layout .card>.top:active{cursor:grabbing}
  body.cardmoving,body.cardmoving *{user-select:none!important}
  body.cardmoving{cursor:grabbing}
  /* 滚动条美化（卡内 + 整页） */
  .card::-webkit-scrollbar{width:9px;height:9px}
  .card::-webkit-scrollbar-thumb{background:#2c3850;border-radius:6px;border:2px solid transparent;background-clip:content-box}
  .card::-webkit-scrollbar-thumb:hover{background:#3a4a6a;background-clip:content-box}
  .card::-webkit-scrollbar-track{background:transparent}
  .card{scrollbar-width:thin;scrollbar-color:#2c3850 transparent}
  .card.dragover{outline:2px dashed var(--blue);outline-offset:3px}
  /* 枝条拖拽吸附 */
  .layout .card li{cursor:grab}
  .layout .card li:active{cursor:grabbing}
  .card li.dragging{opacity:.4}
  .card li.dropbefore{box-shadow:inset 0 3px 0 0 var(--blue)}
  .card li.dropafter{box-shadow:inset 0 -3px 0 0 var(--blue)}
  .card li.dropinside{outline:1px dashed var(--green);outline-offset:2px;background:rgba(62,210,138,.08)}
  .branchghost{position:fixed;z-index:9999;max-width:420px;padding:6px 10px;border:1px solid var(--blue);
    border-radius:7px;background:#151b28;color:var(--ink);font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.35);
    pointer-events:none;opacity:.92;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  ul.bul li ul{list-style:none;margin:4px 0 0;padding-left:18px}
  .card .top{height:3px;background:var(--g,linear-gradient(90deg,#5b9bff,#3fd0de))}
  .pad{padding:14px 16px 15px}
  .cardtools{display:none;float:right;margin:0 0 6px 8px}
  .editing .cardtools{display:block}
  .delcard{border:1px solid #3b2530;background:#261720;color:#ff8a93;border-radius:7px;
    padding:3px 8px;font-size:11px;line-height:1.3;cursor:pointer}
  .delcard:hover{border-color:#f0616d;background:#341923}
  .imgbox{position:relative;display:inline-block;width:220px;min-width:72px;min-height:54px;max-width:100%;
    margin:8px 8px 8px 0;border:1px solid #2c3850;border-radius:9px;background:#0f1420;vertical-align:top;
    box-shadow:0 6px 18px rgba(0,0,0,.22)}
  .imgbox img{display:block;width:100%;height:100%;max-width:none;border-radius:8px;object-fit:contain;cursor:zoom-in}
  .imgbox.thumb{width:160px;height:110px}
  .imgbox.fit{width:100%;height:auto}
  .imgbox.fit img{height:auto}
  .imgtools{display:none;position:absolute;top:6px;right:6px;z-index:5;gap:4px;padding:3px;border-radius:8px;
    background:rgba(10,13,19,.82);border:1px solid #2c3850;backdrop-filter:blur(8px)}
  .editing .imgbox .imgtools{display:flex}
  .imgtools button{border:1px solid #34425d;background:#151b28;color:#cbd6ea;border-radius:6px;padding:2px 6px;
    font-size:11px;line-height:1.4;cursor:pointer}
  .imgtools button:hover{border-color:var(--blue);color:#fff}
  .imghandle{display:none;position:absolute;z-index:4;width:10px;height:10px;border:1px solid #9fc0ff;
    border-radius:50%;background:#5b9bff;box-shadow:0 0 0 2px rgba(10,13,19,.85)}
  .editing .imgbox .imghandle{display:block}
  .imghandle.n{top:-5px;left:50%;transform:translateX(-50%);cursor:ns-resize}
  .imghandle.s{bottom:-5px;left:50%;transform:translateX(-50%);cursor:ns-resize}
  .imghandle.e{right:-5px;top:50%;transform:translateY(-50%);cursor:ew-resize}
  .imghandle.w{left:-5px;top:50%;transform:translateY(-50%);cursor:ew-resize}
  .imghandle.nw{left:-5px;top:-5px;cursor:nwse-resize}
  .imghandle.ne{right:-5px;top:-5px;cursor:nesw-resize}
  .imghandle.sw{left:-5px;bottom:-5px;cursor:nesw-resize}
  .imghandle.se{right:-5px;bottom:-5px;cursor:nwse-resize}
  .imglightbox{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;
    padding:34px;background:rgba(0,0,0,.82);backdrop-filter:blur(6px)}
  .imglightbox.on{display:flex}
  .imglightbox img{max-width:96vw;max-height:92vh;border-radius:10px;box-shadow:0 18px 60px rgba(0,0,0,.5);background:#111}
  .imglightbox .close{position:fixed;top:18px;right:22px;border:1px solid #42506a;background:#151b28;color:#fff;
    border-radius:9px;padding:6px 10px;font-size:13px;cursor:pointer}
  .chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;margin-bottom:9px;
    background:#1b2434;color:var(--ac,#7db0ff);border:1px solid #243150}
  .ti{font-size:17px;font-weight:800;margin:0 0 7px;line-height:1.35}
  .q{font-style:italic;color:#8ea0bd;font-size:12.5px;margin:0 0 10px}.q b{color:#bccbe6;font-style:normal}

  ul.bul{list-style:none;margin:0;padding:0}
  ul.bul li{position:relative;padding:5px 6px 5px 16px;font-size:13.5px;border-radius:7px;color:var(--c-big)}
  ul.bul li::before{content:"•";position:absolute;left:2px;top:5px;color:var(--ac,#7db0ff);font-weight:800}
  ul.bul li .wy{color:var(--c-small);font-size:12px}
  ul.bul li .wy::before{content:"— "}
  .editing ul.bul li:hover{background:#15203a}

  .pill{font-size:10px;padding:0 6px;border-radius:18px;margin-left:4px;vertical-align:middle;white-space:nowrap}
  .p-red{background:#39151b;color:#ff8a93}.p-org{background:#3a2a12;color:#ffc081}.p-grn{background:#10301f;color:#67e0a3}.p-blu{background:#15294a;color:#86b6ff}

  .why{margin-top:11px;background:#1a1320;border:1px solid #3a2230;border-left:3px solid var(--red);
    border-radius:9px;padding:9px 11px;font-size:12.5px;color:#cbb8c1}
  .why b{color:#ff8a93}

  .del{display:none;border:1px solid #2c3850;background:#241620;color:#ff8a93;width:19px;height:19px;border-radius:5px;
    cursor:pointer;font-size:11px;line-height:1;margin-left:5px;vertical-align:middle}
  .addrow{display:none;margin:5px 0 0 14px;border:1px dashed #2c3850;background:transparent;color:var(--sub);
    padding:3px 10px;border-radius:7px;font-size:11.5px;cursor:pointer}
  .addrow:hover{border-color:var(--green);color:#67e0a3}
  .editing .del{display:inline-block}.editing .addrow{display:inline-block}
  .editing #content{outline:2px dashed var(--blue);outline-offset:6px;border-radius:10px}
  .foot{text-align:center;color:var(--faint);font-size:12px;margin-top:32px}

  /* 因果链大卡 */
  .rootmap{margin:6px 0 10px;border-radius:14px;overflow:hidden;border:1px solid #3a2740;
    background:linear-gradient(180deg,#1a1322,#12121d)}
  .rootmap .top{height:3px;background:linear-gradient(90deg,#f0616d,#b48bf2,#5b9bff,#3ed28a)}
  .rootmap .pad{padding:14px 18px 16px}
  .rootmap h3.t{margin:0 0 3px;font-size:18px;font-weight:800}
  .rootmap .lead{color:#9aa6bd;font-size:12.5px;margin:0 0 12px}
  .roots{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px}
  @media(max-width:640px){.roots{grid-template-columns:1fr}}
  .root{border:1px solid #344056;border-radius:11px;padding:11px 13px;background:#141a28}
  .root .rh{font-weight:800;font-size:14px;margin-bottom:3px}
  .root.r1 .rh{color:#c4a4ff} .root.r2 .rh{color:#67dbe8}
  .root .rd{color:#9aa6bd;font-size:12.5px}
  .deriv{margin-top:10px}
  .deriv .gh{font-weight:700;font-size:13px;margin:10px 0 3px;color:#cdd7e8}
  .deriv .gh .em{font-weight:400;color:var(--cmt);font-size:11.5px}
  .chain{position:relative;padding:4px 0 4px 16px;font-size:13px;border-left:1.5px solid #344056;margin-left:6px}
  .chain b{color:#e9edf5}
  .chain .arr{color:#ff8a93;font-weight:700}
  .proof{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .proof .pc{font-size:11px;padding:2px 9px;border-radius:18px;background:#15294a;color:#86b6ff;border:1px solid #243150}
  .proof .pc b{color:#fff}
  .infer{margin-top:12px;background:#101f1a;border:1px solid #1f4733;border-left:3px solid #3ed28a;border-radius:9px;padding:10px 12px;font-size:12.5px;color:#aee0c4}
  .infer b{color:#67e0a3}
  .infer .ln{margin:4px 0}

  /* 推导链卡片：竖向步骤 */
  .steps{margin:2px 0 0}
  .steps .st{position:relative;padding:5px 0 5px 16px;font-size:12.8px;color:var(--c-big);line-height:1.5}
  .steps .st::before{content:"";position:absolute;left:4px;top:0;bottom:0;width:1.5px;background:#33405a}
  .steps .st::after{content:"";position:absolute;left:4px;top:13px;width:9px;height:1.5px;background:#33405a}
  .steps .st:first-child{font-weight:700;color:#fff}
  .steps .st:first-child::before{top:13px}
  .steps .st:last-child::before{height:13px}
  .steps .st b{color:#fff}
  .ccl{margin-top:9px;background:#10261c;border:1px solid #1f4733;border-left:3px solid #3ed28a;border-radius:8px;padding:7px 10px;font-size:12px;color:#9ce7c0}
  .ccl b{color:#67e0a3}
  .twol .ln2{font-size:12.8px;margin:5px 0;color:var(--c-big)}.twol .ln2 b{color:#fff}

  /* 投流大模型 · 树 */
  .mcard{width:100%!important;flex:1 1 100%}
  .mtree{font-size:13px;margin-top:6px}
  .mtree ul{list-style:none;margin:0;padding-left:0}
  .mtree li{position:relative;padding:4px 0 4px 18px}
  .mtree li::before{content:"";position:absolute;left:5px;top:0;bottom:0;width:1.5px;background:#33405a}
  .mtree li::after{content:"";position:absolute;left:5px;top:13px;width:11px;height:1.5px;background:#33405a}
  .mtree li:last-child::before{height:13px}
  .mtree .nd{font-weight:600;color:var(--c-big)}
  .mtree .stg{font-weight:800;font-size:14px}
  .mtree .core{color:#ffd479;font-weight:700}
  .mtree .cm{color:var(--c-small);font-size:12px;margin-left:5px}
  .mtree .cm::before{content:"# "}

  /* 颜色主题 */
  .c-blue{--ac:#5b9bff;--g:linear-gradient(90deg,#5b9bff,#3fd0de)}
  .c-cyan{--ac:#3fd0de;--g:linear-gradient(90deg,#3fd0de,#3ed28a)}
  .c-green{--ac:#3ed28a;--g:linear-gradient(90deg,#3ed28a,#9be15d)}
  .c-orange{--ac:#f5a04a;--g:linear-gradient(90deg,#f5a04a,#f0616d)}
  .c-red{--ac:#f0616d;--g:linear-gradient(90deg,#f0616d,#b48bf2)}
  .c-purple{--ac:#b48bf2;--g:linear-gradient(90deg,#b48bf2,#5b9bff)}
  .c-gold{--ac:#ecc26a;--g:linear-gradient(90deg,#ecc26a,#f5a04a)}
</style>
</head>
<body>
<div class="wrap">

  <style>
    .searchbox{flex:0 1 240px;min-width:120px;background:#0f1622;border:1px solid #2c3850;color:var(--ink);padding:6px 10px;border-radius:8px;font-size:13px;outline:none}
    .searchbox::placeholder{color:var(--faint)}
    .searchbox:focus{border-color:var(--blue)}
    .searchcount{font-size:12px;color:var(--sub);white-space:nowrap}
    #content .card.search-dim{opacity:.12;filter:grayscale(.6);transition:opacity .15s}
    #content .card.search-hit{outline:2px solid var(--gold);outline-offset:2px;border-radius:10px}
  </style>
  <div class="bar">
    <span class="logo">⚡ 千川全域投流 · 知识看板</span>
    <input id="searchBox" class="searchbox" type="search" placeholder="🔍 搜文字 / 图里的字…" oninput="doSearch(this.value)">
    <span class="searchcount" id="searchCount"></span>
    <button class="btn" id="editBtn" onclick="toggleEdit()">📝 编辑</button>
    <button class="btn cardbtn" onclick="addCard()">＋ 卡片</button>
    <button class="btn cardbtn" onclick="addSection()">＋ 分类</button>
    <button class="btn" id="layoutBtn" onclick="toggleLayout()">🔧 排版</button>
    <button class="btn" onclick="saveCloud()">☁️ 保存到云端</button>
    <button class="btn" onclick="location.reload()">⟳ 重载</button>
    <span class="status" id="status"></span>
    <span class="hint">📝<b>编辑</b>：每行分两条——<b>上面一条大字、下面一条小字</b>，点哪条改哪条，打字或粘贴都自动套好字号；＋卡片 ＋分类 增减内容。🔧<b>排版</b>：拖卡片<b>顶部色条</b>自由摆放、拖<b>右下角</b>缩放。改完点☁️保存。</span>
  </div>

  <div id="content">
    <div id="loadingNote" style="padding:40px 24px;color:#888;font-size:15px">⌛ 正在从 GitHub 载入内容…</div>
  </div>

  <div class="foot">10 篇全部串联 · 卡片式 · 可增删行 · 可云保存 · 改完点「保存到云端」</div>
</div>

<script>
  let editing=false, layout=false;
  function toggleEdit(){
    if(layout) toggleLayout();           // 进文字编辑前先退排版
    editing=!editing;
    ensureCardControls();
    ensureSectionControls();
    normalizeRows();
    document.getElementById('content').contentEditable=editing;
    document.body.classList.toggle('editing',editing);
    const b=document.getElementById('editBtn');
    b.classList.toggle('on',editing);
    b.textContent=editing?'✅ 完成':'📝 编辑';
    setStatus(editing?'编辑中…点文字直接改；粘贴自动套用大字/小字':'');
  }
  function toggleLayout(){
    if(editing) toggleEdit();             // 进排版前先退文字编辑
    layout=!layout;
    document.body.classList.toggle('layout',layout);
    const b=document.getElementById('layoutBtn');
    b.classList.toggle('on',layout);
    b.textContent=layout?'✅ 完成排版':'🔧 排版';
    syncLayoutDraggables();
    clearDropMarks();

  // 拖动换位：卡片、任意层级枝条分开处理
  let dragEl=null, dragType='';
  function syncLayoutDraggables(){
    // 卡片改用「顶部色条手柄 + 指针拖动」，关掉原生拖拽避免和缩放/选区打架
    document.querySelectorAll('.card').forEach(c=>c.draggable=false);
    document.querySelectorAll('.card li').forEach(li=>li.draggable=layout);

  /* ===== 自由画布：抓顶部色条，把卡片拖到任意位置（可重叠、停哪是哪） ===== */
  let cardDrag=null;
  // 第一次在某个分类里拖卡片时，把这一组「冻结」成自由画布：所有卡片就地变绝对定位，谁也不挤谁
  function freezeGroup(group){
    if(group.classList.contains('freecanvas')) return;
    const gr=group.getBoundingClientRect();
    const cards=Array.prototype.filter.call(group.children,c=>c.classList&&c.classList.contains('card'));
    const snap=cards.map(c=>{const r=c.getBoundingClientRect();return {c,left:r.left-gr.left,top:r.top-gr.top,w:r.width};});
    group.classList.add('freecanvas');
    snap.forEach(p=>{
      p.c.style.position='absolute';
      p.c.style.left=Math.round(p.left)+'px';
      p.c.style.top=Math.round(p.top)+'px';
      p.c.style.width=Math.round(p.w)+'px';
      p.c.style.margin='0';
    });
    fitGroupHeight(group);
  }
  function fitGroupHeight(group){
    let mb=120;
    Array.prototype.forEach.call(group.children,c=>{if(c.classList&&c.classList.contains('card'))mb=Math.max(mb,c.offsetTop+c.offsetHeight);});
    group.style.height=Math.round(mb+24)+'px';
  }
  document.addEventListener('pointerdown',e=>{
    if(!layout||e.button!==0)return;
    const top=e.target.closest('.top');
    if(!top)return;
    const card=top.parentElement;
    if(!card||!card.classList.contains('card'))return;
    const group=card.parentElement;
    if(!group||!group.classList.contains('cards'))return;
    freezeGroup(group);
    const cr=card.getBoundingClientRect();
    cardDrag={card,group,offX:e.clientX-cr.left,offY:e.clientY-cr.top,moved:false};
    card.classList.add('dragging');
    card.style.zIndex='999';
    document.body.classList.add('cardmoving');
    if(top.setPointerCapture){try{top.setPointerCapture(e.pointerId);}catch(_){}}
    e.preventDefault();e.stopPropagation();
  },true);
  document.addEventListener('pointermove',e=>{
    if(!cardDrag)return;
    e.preventDefault();
    if(e.clientY>window.innerHeight-60)window.scrollBy(0,20);
    else if(e.clientY<72)window.scrollBy(0,-20);
    const gr=cardDrag.group.getBoundingClientRect();
    let nl=e.clientX-gr.left-cardDrag.offX;
    let nt=e.clientY-gr.top-cardDrag.offY;
    if(nl<0)nl=0; if(nt<0)nt=0;
    cardDrag.card.style.left=Math.round(nl)+'px';
    cardDrag.card.style.top=Math.round(nt)+'px';
    const need=nt+cardDrag.card.offsetHeight+24;
    if(need>cardDrag.group.offsetHeight)cardDrag.group.style.height=Math.round(need)+'px';
    cardDrag.moved=true;
  },true);
  document.addEventListener('pointerup',()=>{
    if(!cardDrag)return;
    cardDrag.card.classList.remove('dragging');
    cardDrag.card.style.zIndex='';
    if(cardDrag.moved){
      cardDrag.group.appendChild(cardDrag.card); // 最近拖动的压在最上层
      fitGroupHeight(cardDrag.group);
      setStatus('已自由摆放，记得保存');

  function clearDropMarks(){

  function branchDropMode(li,e){
    const r=li.getBoundingClientRect(), y=(e.clientY-r.top)/Math.max(r.height,1);
    if(y<.28) return 'before';
    if(y>.72) return 'after';
    return 'inside';
  }
  function canDropBranch(target){

  function childListFor(li){
    let ul=Array.from(li.children).find(x=>x.tagName==='UL');
    if(!ul){ul=document.createElement('ul');li.appendChild(ul);}

  }
  function branchText(li){
    return Array.from(li.childNodes)
      .filter(n=>!(n.nodeType===1&&n.tagName==='UL'))
      .map(n=>n.textContent||'').join('')
      .replace(/✕|\+ 新增行/g,'').trim();

  function moveBranch(target,e){
    const mode=branchDropMode(target,e);
    if(mode==='before') target.parentElement.insertBefore(dragEl,target);

    else childListFor(target).appendChild(dragEl);
  }
  let branchMouse=null, branchGhost=null;
  document.addEventListener('mousedown',e=>{
    if(!layout||e.button!==0)return;

  },true);
  document.addEventListener('mousemove',e=>{
    if(!branchMouse)return;
    const moved=Math.abs(e.clientX-branchMouse.x)+Math.abs(e.clientY-branchMouse.y)>5;

      dragEl=branchMouse.li;dragType='branch';branchMouse.active=true;dragEl.classList.add('dragging');
      branchGhost=document.createElement('div');branchGhost.className='branchghost';branchGhost.textContent=branchText(dragEl)||'枝条';
      document.body.appendChild(branchGhost);

    branchGhost.style.left=(e.clientX+12)+'px';branchGhost.style.top=(e.clientY+12)+'px';
    if(e.clientY>window.innerHeight-56)window.scrollBy(0,18);

  document.addEventListener('dragover',e=>{

  function normalizeRows(root=document,opts={}){
    const keepFresh=!!opts.keepFresh;
    const dropEmpty=!!opts.dropEmpty;
    const keepEditing=editing && !dropEmpty;
    const base=(root.matches&&root.matches('#content'))?root:(root.querySelector&&root.querySelector('#content'))||root;
    base.querySelectorAll('.subnote.ph').forEach(n=>{
      if(!n.textContent.trim() && !(keepEditing || (keepFresh && n.dataset.keep==='1'))) n.remove();
    });
    base.querySelectorAll('.bigtext.ph').forEach(n=>{
      if(!n.textContent.trim() && !keepEditing && n.closest('li')?.querySelector(':scope > .subnote')) n.remove();
    });
    base.querySelectorAll('ul.bul > li').forEach(li=>{
      if(li.querySelector(':scope > .bigtext,:scope > .subnote')) return;
      const del=li.querySelector(':scope > .del');
      const wy=li.querySelector(':scope > .wy');
      const big=document.createElement('div');
      big.className='bigtext';
      Array.from(li.childNodes).forEach(n=>{
        if(n===del || n===wy) return;
        big.appendChild(n);

      const smallText=wy ? wy.textContent.replace(/^—\s*/,'').trim() : '';
      li.textContent='';
      li.appendChild(big);
      if(smallText){
        const small=document.createElement('div');
        small.className='subnote';
        small.textContent=smallText;
        li.appendChild(small);
      }
      if(del) li.appendChild(del);
    });
  }

    try{
      const url='https://raw.githubusercontent.com/'+GH.owner+'/'+GH.repo+'/'+GH.branch+'/'+GH.path+'?_='+Date.now();
      const r=await fetch(url,{cache:'no-store'});
      if(!r.ok)throw new Error('GitHub '+r.status);
      const text=await r.text();
      document.getElementById('content').innerHTML=text;
      normalizeRows();ensureCardControls();ensureSectionControls();enhanceImages(document);syncLayoutDraggables();syncColorInputs();
      setStatus('已载入 '+time());
    }catch(e){ setStatus('载入失败：'+e.message+'（点重载重试）'); }
  }
  async function saveCloud(){
    normalizeRows(document,{dropEmpty:true});
    let t=localStorage.getItem(TK_KEY);
    if(!t){ t=(prompt('首次保存：粘贴你的 GitHub 令牌（只存在你这台浏览器，不会写进页面）')||'').trim(); if(!t)return; localStorage.setItem(TK_KEY,t); }
    setStatus('保存中…');
    try{
      const api='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.path;
      const meta=await fetch(api+'?ref='+GH.branch,{headers:ghHeaders(t)});
      if(meta.status===401||meta.status===403){localStorage.removeItem(TK_KEY);setStatus('令牌无效/越权，已清除，请重新点保存输入');return;}
      const sha=meta.ok?(await meta.json()).sha:undefined;
      const snap=document.getElementById('content').cloneNode(true);
      snap.querySelectorAll('.sectools').forEach(x=>x.remove());
      snap.querySelectorAll('.search-hit,.search-dim').forEach(x=>x.classList.remove('search-hit','search-dim'));
      const data=snap.innerHTML;
      const body={message:'更新看板内容 '+new Date().toLocaleString('zh-CN'),content:b64(data),branch:GH.branch};
      if(sha)body.sha=sha;
      const put=await fetch(api,{method:'PUT',headers:ghHeaders(t),body:JSON.stringify(body)});
      if(put.ok){setStatus('✅ 已存 GitHub '+time());}
      else{const er=await put.json().catch(function(){return {};});setStatus('保存失败：'+(er.message||put.status));}
    }catch(e){setStatus('保存出错：'+e.message);}
  }
  function time(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');}
  // 粘贴只插纯文本：落进哪个框就自动套那个框的字号/颜色（大字框=大字，小字框=小字）；图片粘贴照旧
  document.getElementById('content').addEventListener('paste',function(e){
    const dt=e.clipboardData;if(!dt)return;
    const types=Array.prototype.slice.call(dt.types||[]);
    if((dt.files&&dt.files.length)||types.indexOf('Files')>-1)return;
    const text=dt.getData('text/plain');
    if(text==null)return;
    e.preventDefault();
    document.execCommand('insertText',false,text);
    setTimeout(()=>normalizeRows(document,{keepFresh:true}),0);
  });
  document.getElementById('content').addEventListener('keydown',function(e){
    if(e.key!=='Enter'||!editing) return;
    const field=activeEditField();
    if(field&&field.classList.contains('bigtext')){
      e.preventDefault();
      focusEditable(ensureSubnote(field.closest('li')));
      return;
    }
    if(field&&field.classList.contains('subnote')){
      e.preventDefault();
      const li=field.closest('li');
      const next=makeSubnote();
      li.insertBefore(next,field.nextElementSibling&&field.nextElementSibling.classList.contains('subnote')?field.nextElementSibling:null);
      if(!next.nextSibling){
        const del=li.querySelector(':scope > .del');
        if(del) li.insertBefore(next,del);
      }
      focusEditable(next);
    }
  });
  document.getElementById('content').addEventListener('input',function(){setTimeout(()=>normalizeRows(document,{keepFresh:true}),0);});
  /* ===== 🔍 搜索（卡片文字 + 图片OCR文字）+ 图片自动OCR ===== */
  (function(){
    const ocrPending=new WeakSet();
    let ocrQueue=[], ocrBusy=false, ocrEnabled=false, ocrWorker=null, ocrWorkerP=null;
    function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('加载失败'));document.head.appendChild(s);});}
    async function getWorker(){
      if(ocrWorker)return ocrWorker;
      if(ocrWorkerP)return ocrWorkerP;
      ocrWorkerP=(async()=>{
        if(!window.Tesseract){setStatus('首次搜图：下载OCR中文包（约几MB，仅一次）…');await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');}
        ocrWorker=await Tesseract.createWorker('chi_sim');
        return ocrWorker;
      })();
      return ocrWorkerP;
    }
    window.queueOCR=function(img){
      if(!img||img.dataset.ocr!==undefined)return;   // 已OCR过（含从云端content.html读到的）→ 跳过
      if(ocrPending.has(img))return;
      ocrPending.add(img);ocrQueue.push(img);
      if(ocrEnabled)runQueue();
    };
    function enableOCR(){ocrEnabled=true;if(ocrQueue.length)runQueue();}
    async function runQueue(){
      if(ocrBusy)return;ocrBusy=true;
      try{
        const w=await getWorker();
        while(ocrQueue.length){
          const img=ocrQueue.shift();
          try{const r=await w.recognize(img.src);img.dataset.ocr=(r.data.text||'').replace(/\s+/g,' ').trim();}
          catch(e){img.dataset.ocr='';}
          ocrPending.delete(img);
          refreshIfSearching();
        }
        setStatus('图片文字已识别，可搜索（记得点☁️保存永久保留）');
      }catch(e){setStatus('OCR出错：'+e.message);}
      ocrBusy=false;
    }
    function norm(s){return (s||'').toLowerCase().replace(/\s+/g,'');}   // 去所有空格：中文OCR会在字间插空格，搜"追投"才能匹配"追 投"
    function hay(card){let t=card.textContent||'';card.querySelectorAll('img[data-ocr]').forEach(i=>{t+=' '+i.dataset.ocr;});return norm(t);}
    window.doSearch=function(q){
      q=norm(q);
      const cnt=document.getElementById('searchCount');
      if(!q){window.clearSearch();return;}
      enableOCR();                                   // 一开搜就把没OCR的图补上
      let n=0;
      document.querySelectorAll('#content .card').forEach(c=>{
        const hit=hay(c).indexOf(q)>-1;
        c.classList.toggle('search-hit',hit);
        c.classList.toggle('search-dim',!hit);
        if(hit)n++;
      });
      if(cnt)cnt.textContent='找到 '+n+' 张';
    };
    window.clearSearch=function(){
      document.querySelectorAll('#content .search-hit,#content .search-dim').forEach(c=>c.classList.remove('search-hit','search-dim'));
      const b=document.getElementById('searchBox');if(b)b.value='';
      const cnt=document.getElementById('searchCount');if(cnt)cnt.textContent='';
    };
    function refreshIfSearching(){const b=document.getElementById('searchBox');if(b&&b.value.trim())window.doSearch(b.value);}
    document.addEventListener('paste',()=>setTimeout(enableOCR,150));   // 贴新图 → 自动OCR
    const sb=document.getElementById('searchBox');if(sb)sb.addEventListener('keydown',e=>{if(e.key==='Escape')window.clearSearch();});
  })();

  loadFromGitHub();
</script>
